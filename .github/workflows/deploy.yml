name: Deploy

on:
  push:
    branches: [main]

jobs:
  publish:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:stable
            ghcr.io/${{ github.repository }}:${{ github.sha }}

  deploy:
    name: Deploy to homelab
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - name: Connect to WireGuard VPN
        run: |
          sudo apt-get install -y wireguard-tools
          echo "${{ secrets.WG_CONFIG }}" | sudo tee /etc/wireguard/wg0.conf > /dev/null
          sudo chmod 600 /etc/wireguard/wg0.conf
          sudo wg-quick up wg0

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            podman-compose -f podman-compose.yml pull
            podman stop --time 0 flashi || true
            podman rm flashi 2>/dev/null || true
            podman network rm flashi_default || true
            podman-compose -f podman-compose.yml up -d
