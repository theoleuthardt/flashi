services:
  flashi:
    image: ghcr.io/theoleuthardt/flashi:stable
    container_name: flashi
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - flashi-data:/data
    environment:
      # generate with: openssl rand -hex 32
      - JWT_SECRET=CHANGE_ME_long_random_string_here
      - NODE_ENV=production
      - PORT=3001
      - DATA_DIR=/data

volumes:
  flashi-data:
